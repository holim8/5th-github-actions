name: Build Metadata Generator
on: workflow_dispatch

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: 메타데이터 생성
        id: meta
        run: |
          # 1. 7자리 SHA 추출
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 2. 빌드 ID 생성 (run_number와 위에서 만든 short_sha 활용)
          echo "build_id=build-${{ github.run_number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 3. 액터 이름 대문자 변환
          ACTOR_UPPER=$(echo "${{ github.actor }}" | tr 'a-z' 'A-Z')
          echo "actor_upper=$ACTOR_UPPER" >> $GITHUB_OUTPUT
          
          # 4. 타임스탬프 생성
          echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: 메타데이터 출력
        run: |
          echo "=== 빌드 메타데이터 ==="
          echo "Build ID: ${{ steps.meta.outputs.build_id }}"
          echo "Short SHA: ${{ steps.meta.outputs.short_sha }}"
          echo "Actor: ${{ steps.meta.outputs.actor_upper }}"
          echo "Timestamp: ${{ steps.meta.outputs.timestamp }}"

      - name: Runner 환경 정보
        run: |
          echo "OS: ${{ runner.os }}"
          echo "Arch: ${{ runner.arch }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
