name: Build Info Simulation

on:
  workflow_dispatch:

env:
  APP_NAME: MyApp
  BUILD_ENV: production
  VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    # Job 레벨에서 BUILD_ENV를 staging으로 덮어씀
    env:
      BUILD_ENV: staging
    
    steps:
      - name: 워크플로우 레벨 변수 확인
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "VERSION: $VERSION"
          echo "BUILD_ENV: $BUILD_ENV"

      - name: Step 레벨로 BUILD_ENV 덮어쓰기
        # Step 레벨에서 BUILD_ENV를 development로 덮어씀
        env:
          BUILD_ENV: development
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "VERSION: $VERSION"
          echo "BUILD_ENV: $BUILD_ENV"

      - name: 최종 빌드 정보
        run: |
          echo "=== 빌드 완료 ==="
          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "Environment: $BUILD_ENV"
          echo "=== 끝 ==="
